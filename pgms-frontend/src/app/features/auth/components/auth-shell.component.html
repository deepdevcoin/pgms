<section class="auth-shell">
  <div class="hero">
    <div>
      <p class="eyebrow">PGMS Frontend</p>
      <h1>Angular foundation for secure PG operations.</h1>
      <p>
        Step 1 establishes the application structure, environment wiring, shared modules, and
        guarded feature routes so the remaining modules can build on a stable base.
      </p>
    </div>
  </div>

  <div class="panel" *ngIf="metadata$ | async as metadata">
    <app-feature-placeholder
      [title]="metadata.title"
      [description]="metadata.description"
      callout="Authentication UI and flows will be implemented in Step 2."
    ></app-feature-placeholder>
  </div>
</section>
